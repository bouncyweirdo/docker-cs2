services:
  cs2:
    build: ./docker
    container_name: cs2-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/cs2:/home/steam/cs2
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27020:27020/udp"
    networks:
      - cs2

networks:
  cs2:
    driver: bridge
